<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Section</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <img src="../assets/Asset 1@3x.png" alt="Logo">
    </header>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <main>
        <section id="products">
            <div class="left-filter-box">
                <h2>Filter by</h2>
                <div class="filter-category">
                    <h3>Category</h3>
                    <ul>
                        <li><input type="checkbox" id="rings" name="category"><label for="rings">Rings</label></li>
                        <li><input type="checkbox" id="necklaces" name="category"><label for="necklaces">Necklaces</label></li>
                        <li><input type="checkbox" id="bracelets" name="category"><label for="bracelets">Bracelets</label></li>
                        <li><input type="checkbox" id="earrings" name="category"><label for="earrings">Earrings</label></li>
                    </ul>
                </div>
                <div class="filter-price">
                    <h3>Price Range</h3>
                    <ul>
                        <li><input type="checkbox" id="under100" name="price"><label for="under100">Under $100</label></li>
                        <li><input type="checkbox" id="100-500" name="price"><label for="100-500">$100 - $500</label></li>
                        <li><input type="checkbox" id="500-1000" name="price"><label for="500-1000">$500 - $1000</label></li>
                        <li><input type="checkbox" id="over1000" name="price"><label for="over1000">Over $1000</label></li>
                    </ul>
                </div>
            </div>
            <div class="right-products-container-wrapper">
                <div>
                    
                </div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </section>
    </main>
</body>
</html>
